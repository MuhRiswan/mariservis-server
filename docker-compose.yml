version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: mariservis-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: mariservis_db
    ports:
      - "5433:5432"
    volumes:
      - mariservis_pgdata:/var/lib/postgresql/data

volumes:
  mariservis_pgdata:
